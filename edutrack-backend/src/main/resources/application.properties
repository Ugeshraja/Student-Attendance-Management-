# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database Configuration (supports local development and cloud variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/edutrack_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configurations
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
edutrack.upload.dir=${UPLOAD_DIR:uploads/profile-pictures}

# Application Custom JWT Configurations
edutrack.app.jwtSecret=${JWT_SECRET:9a67471ec97303e3874d1a10052b6d194914c62c3e1e626e2e50587b1c312781}
edutrack.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# CORS Allowed Origins
edutrack.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,https://edutrack.vercel.app}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.edutrack=DEBUG
